[[menus]]
path = "/routing/bgp/template"
type = "Directory"
[[menus.flags]]
name = "*"
description = "default"
[[menus.flags]]
name = "X"
description = "disabled"
[[menus.flags]]
name = "I"
description = "inactive"
[[menus.arguments]]
name = "name"
type = "string"
required = true
[[menus.arguments]]
name = "routing-table"
type = "enum"
description = "Name of the routing table, to install routes in. Overrides the instance parameter."
unset = true
[[menus.arguments]]
name = "vrf"
type = "enum"
description = "Name of the VRF BGP connections operate on. By default uses the \"main\" routing table."
unset = true
[[menus.arguments]]
name = "templates"
type = ""
[[menus.arguments]]
name = "as"
type = "as"
description = "A 32-bit BGP autonomous system number. The value accepts AS-Plain or AS-Dot formats. Override the instance ASN and configure BGP confederation using the following format: _`confederation_as/as`_. For example, if your AS is 34 and your confederation AS is 43, set `as=43/34`."
unset = true
[[menus.arguments]]
name = "nexthop-choice"
type = "enum (default | force-self | propagate)"
description = "Affect outgoing **NEXT\\_HOP** attribute selection. Next-hops set in filters always take precedence and are not changed on route reflection except when set in a filter.   default - select the next-hop as described in [`RFC 4271`](https://tools.ietf.org/html/rfc4271)   force-self - use the local address of the interface that connects to the peer as the next-hop   propagate - propagate received next-hop; if the route has a BGP **NEXT\\_HOP** attribute, use it as the next-hop; otherwise, fall back to the default case"
unset = true
[[menus.arguments]]
name = "multihop"
type = "bool"
description = "Enable when the remote peer is more than one hop away.This option affects outgoing next-hop selection as described in [`RFC 4271`](https://tools.ietf.org/html/rfc4271) (for eBGP only, excluding iBGP peers local to the confederation). It also affects:Whether to accept connections from peers not in the same network (the remote address of the connection is used for this check)Whether to accept incoming routes with a NEXT\\_HOP attribute not in the same network as the address used to establish the connectionThe target scope of routes installed from this peer; routes from multi-hop or iBGP peers resolve their next-hops through IGP routes by default"
unset = true
[[menus.arguments]]
name = "hold-time"
type = ""
[[menus.arguments]]
name = "keepalive-time"
type = "time"
description = "The interval between keepalive messages, if not set then by default keepalive is 1/3 of the `hold-time`."
unset = true
[[menus.arguments]]
name = "afi"
type = "ubit (ip, ipv6, l2vpn, l2vpn-cisco, vpnv4, vpnv6, evpn)"
description = "List of address families this peer can exchange routing information. The remote peer must support BGP capabilities optional parameter (they usually do) to negotiate any other address families than IP."
unset = true
[[menus.arguments]]
name = "cisco-vpls-nlri-len-fmt"
type = "enum (auto-bits | auto-bytes | bits | bytes)"
description = "VPLS NLRI length format type. Used for compatibility with Cisco VPLS. \\[\\[Read more>>\\]\\]."
unset = true
[[menus.arguments]]
name = "output.remove-private-as"
type = "bool"
description = "If set, then the BGP **AS-PATH** attribute is removed before sending out route updates if the attribute contains only private AS numbers.The removal process happens before routing filters are applied and before the local, AS number is prepended to the AS path."
unset = true
[[menus.arguments]]
name = "output.as-override"
type = "bool"
description = "If set, then all instances of the remote peer's AS number in the BGP **AS-PATH** attribute are replaced with the local AS number before sending a route update to that peer. Happens before routing filters and prepend."
unset = true
[[menus.arguments]]
name = "use-bfd"
type = "bool"
description = "Whether to use the BFD protocol for faster connection state detection."
unset = true
[[menus.arguments]]
name = "save-to"
type = "string"
description = "Filename to save BGP protocol-specific packet content (Exported PDU) into pcap format. This method allows much simpler peer-specific packet capturing for debugging purposes."
unset = true
[[menus.arguments]]
name = "output.add-path"
type = "ubit (ip, ipv6)"
description = "Enable sending of additional paths for specified address families (BGP Addpath)."
unset = true
[[menus.arguments]]
name = "output.affinity"
type = "enum (main | alone | remote-as | instance | afi | vrf | input)"
description = "Configure output multicore processing. Read more in [Routing Protocol Multi-core Support](../../user-guides/routing-and-networking-protocols/routing-protocol-multi-core-support.md) article.   **alone** - input and output of each session is processed in its own process, the most likely best option when there are a lot of cores and a lot of peers   **afi, instance, vrf, remote-as** - try to run input/output of new session in process with similar parameters   **main** - run input/output in the main process (could potentially increase performance on single-core even possibly on multicore devices with small amount of cores)   **input** - run output in the same process as input (can be set only for output affinity)"
unset = true
[[menus.arguments]]
name = "output.redistribute"
type = "ubit (connected, static, rip, ospf, isis, bgp, vpn, dhcp, fantasy, modem, bgp-mpls-vpn, slaac)"
description = "Enable redistribution of specified route types."
unset = true
[[menus.arguments]]
name = "output.filter-select"
type = "enum"
description = "Name of the routing select chain to be used for prefix selection. If not specified, then default selection is used."
unset = true
[[menus.arguments]]
name = "output.filter-chain"
type = "enum"
description = "Name of the routing filter chain to be used on the output prefixes. If the chain is not specified, then BGP by default accepts everything."
unset = true
[[menus.arguments]]
name = "output.network"
type = "enum"
description = "Name of the address list used to send local networks. The network is sent only if a matching IGP route exists in the routing table and its **ORIGIN** attribute is set to IGP, other distribution methods have **ORIGIN** attribute set to INCOMPLETE."
unset = true
[[menus.arguments]]
name = "output.network-blackhole"
type = "bool"
unset = true
[[menus.arguments]]
name = "output.default-originate"
type = "enum (never | if-installed | always)"
description = "Specifies default route (0.0.0.0/0) distribution method. 'if-installed' option can be used to distribute default route only if corresponding IGP route present in the routing table."
unset = true
[[menus.arguments]]
name = "output.default-prepend"
type = "num"
description = "How many times to prepend local ASN."
unset = true
[[menus.arguments]]
name = "output.no-client-to-client-reflection"
type = "bool"
description = "Disable client-to-client route reflection in Route Reflector setups."
unset = true
[[menus.arguments]]
name = "output.no-early-cut"
type = "bool"
description = "The early cut is the mechanism, to guess (based on default RFC behavior) what would happen with the sent NLRI when received by the remote peer. If the algorithm determines that the NLRI is going to be dropped, a peer will not even try to send it. However such behavior may not be desired in specific scenarios, then this option should be used to disable the early cut feature. Early cut works with eBGP sessions."
unset = true
[[menus.arguments]]
name = "output.keep-sent-attributes"
type = "bool"
description = "Store in memory sent prefix attributes, required for `dump-saved-advertisements` command to work. By default, sent-out prefixes are not stored to preserve the router's memory. An option should be enabled only for debugging purposes when necessary to see currently advertised prefixes."
unset = true
[[menus.arguments]]
name = "input.add-path"
type = "ubit (ip, ipv6)"
description = "Accept received additional paths (BGP Addpath) for specified address families."
unset = true
[[menus.arguments]]
name = "input.attr-error-handling"
type = "enum (default | revised)"
[[menus.arguments]]
name = "input.affinity"
type = "enum (main | alone | remote-as | instance | afi | vrf)"
unset = true
[[menus.arguments]]
name = "input.filter"
type = "enum"
description = "Name of the routing filter chain to be used on input prefixes. This happens after NLRIs are processed. If the chain is not specified, then BGP by default accepts everything."
unset = true
[[menus.arguments]]
name = "input.filter-nlri"
type = "enum"
description = "Name of the filter chain that will filter incoming IPv4/IPv6 NLRIs directly before they are  stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session restart."
unset = true
[[menus.arguments]]
name = "input.allow-as"
type = "num"
description = "Indicates how many times to allow your own AS number in AS-PATH, before discarding a prefix."
unset = true
[[menus.arguments]]
name = "input.accept-nlri"
type = "enum"
description = "Name of the ipv4/6 address-list. A quick way to filter incoming updates with specific NLRIs. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session restart."
unset = true
[[menus.arguments]]
name = "input.filter-communities"
type = "enum"
description = "A quick way to filter incoming updates with specific communities. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session refresh."
unset = true
[[menus.arguments]]
name = "input.filter-ext-communities"
type = "enum"
description = "A quick way to filter incoming updates with specific extended communities. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session refresh."
unset = true
[[menus.arguments]]
name = "input.filter-large-communities"
type = "enum"
description = "A quick way to filter incoming updates with specific large communities. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session refresh."
unset = true
[[menus.arguments]]
name = "input.accept-communities"
type = "enum"
description = "A quick way to filter incoming updates with specific communities. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session refresh."
unset = true
[[menus.arguments]]
name = "input.accept-ext-communities"
type = "enum"
description = "A quick way to filter incoming updates with specific extended communities. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session refresh."
unset = true
[[menus.arguments]]
name = "input.accept-large-communities"
type = "enum"
description = "A quick way to filter incoming updates with specific large communities. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session refresh."
unset = true
[[menus.arguments]]
name = "input.filter-unknown"
type = "enum"
description = "A quick way to filter incoming updates with specific \"unknown\" attributes. It allows filtering incoming messages directly before they are even parsed and stored in memory, that way significantly reducing memory usage. Regular input filter chain can only reject prefixes which means that it will still eat memory and will be visible in /routing route table as \"not active, filtered\". Changes to be applied required session refresh."
unset = true
[[menus.arguments]]
name = "input.limit-process-routes-ipv4"
type = "enum (10 | 100 | 1000 | 10000 | 100000 | 1000000 | 10000000)"
description = "Try to limit the amount of received IPv4 routes to the specified number. This number does not represent the exact number of routes going to be installed in the routing table by the peer. [BGP session \"clear\"](#routingbgpsessionclear) command must be used to reset the flag if the limit is reached."
unset = true
[[menus.arguments]]
name = "input.limit-process-routes-ipv6"
type = "enum (10 | 100 | 1000 | 10000 | 100000 | 1000000 | 10000000)"
description = "Try to limit the amount of received IPv6 routes to the specified number. This number does not represent the exact number of routes going to be installed in the routing table by the peer. BGP session \"clear\" command must be used to reset the flag if the limit is reached."
unset = true

[[menus]]
path = "/routing/bgp/vpls"
type = "Directory"
[[menus.flags]]
name = "X"
description = "disabled"
[[menus.flags]]
name = "I"
description = "inactive"
[[menus.arguments]]
name = "name"
type = "string"
unset = true
[[menus.arguments]]
name = "vrf"
type = "enum"
unset = true
[[menus.arguments]]
name = "rd"
type = "address (flags=R)"
description = "Specifies the value that gets attached to VPLS NLRI so that receiving routers can distinguish advertisements that may otherwise look the same. This implies that a unique route-distinguisher for every VPLS must be used. It is not necessary to use the same route distinguisher for some VPLS on all routers forming that VPLS as distinguisher is not used for determining if some BGP NLRI is related to a particular VPLS (Route Target attribute is used for this), but it is mandatory to have different distinguishers for different VPLSes. Accepts 3 types of formats. [Read more>>](../../user-guides/routing-and-networking-protocols/route-distinguisher-and-route-target.md)"
unset = true
[[menus.arguments]]
name = "site-id"
type = "num"
description = "Unique site identifier. Each site must have a unique site-id. A parameter must be set for&nbsp;RFC 4761 style VPLS signaling."
unset = true
[[menus.arguments]]
name = "cisco-id"
type = "address"
description = "Unique identifier. A parameter must be set for cisco-style VPLS signaling. In most cases this should not be used, any modern software supports RFC 4761 style signaling (see site-id parameter). Parameter is a merge of l2-router-id and RD, for example: 10.155.155.1&amp;6550:123"
unset = true
[[menus.arguments]]
name = "import-route-targets"
type = ""
[[menus.arguments]]
name = "export-route-targets"
type = ""
[[menus.arguments]]
name = "local-pref"
