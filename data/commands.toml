[[menus]]
path = "/ip/settings"
type = "Settings Directory"
[[menus.arguments]]
name = "ip-forward"
type = "bool"
description = "Enable or disable packet forwarding between interfaces. Resets all configuration parameters to defaults according to [RFC 1812](https://tools.ietf.org/html/rfc1812) for routers."
[[menus.arguments]]
name = "send-redirects"
type = "bool"
description = "Send ICMP redirects. Enable this on routers."
[[menus.arguments]]
name = "accept-source-route"
type = "bool"
description = "Accept packets with the SRR option. Accepting source-routed (SSRR/LSRR) packets is a well-known spoofing/security risk and should be kept disabled unless required by the setup."
[[menus.arguments]]
name = "accept-redirects"
type = "bool"
description = "Accept ICMP redirect messages. Enable on hosts and disable on routers."
[[menus.arguments]]
name = "secure-redirects"
type = "bool"
description = "Accept ICMP redirect messages only for gateways listed in the default gateway list."
[[menus.arguments]]
name = "rp-filter"
type = "enum (no | strict | loose)"
[[menus.arguments]]
name = "ipv4-multipath-hash-policy"
type = "enum (l3 | l4 | l3-inner)"
[[menus.arguments]]
name = "tcp-syncookies"
type = "bool"
description = "Send syncookies when the SYN backlog queue of a socket overflows. This helps prevent SYN flood attacks. However, syncookies violate the TCP protocol and prevent the use of TCP extensions, which can degrade some services (for example, SMTP relaying). This degradation may be visible to your clients and relays contacting you."
[[menus.arguments]]
name = "tcp-timestamps"
type = "enum (disabled | random-offset | enabled)"
description = "Enable or disable TCP timestamps, or add a random offset to TCP timestamps (default behavior). Disabling timestamps can help reduce performance drop spikes."
[[menus.arguments]]
name = "max-neighbor-entries"
type = "num"
[[menus.arguments]]
name = "arp-timeout"
type = "time"
description = "Sets Linux `base_reachable_time` (`base_reachable_time_ms`) on all interfaces that use ARP. The initial validity of the ARP entry is picked from the interval [`timeout/2 - 3*timeout/2`] (default from 15s to 45s) after the neighbor was found. Can use postfix ms, s, m, h, d for milliseconds, seconds, minutes, hours, or days. If no postfix is set then seconds (s) are used. The parameter means how long a valid ARP record will be considered complete if no one communicates with the specific MAC/IP during this time. The parameter does not represent a time when an ARP entry is removed from the ARP cache (see `max-neighbor-entries` setting)."
[[menus.arguments]]
name = "icmp-rate-limit"
type = "num"
description = "Limit the maximum rates for sending ICMP packets whose type matches icmp-rate-mask to specific targets. Value of `0` disables any limiting, other values indicate the minimum space between responses in milliseconds."
[[menus.arguments]]
name = "icmp-rate-mask"
type = "num"
description = "Mask of ICMP types for which rates are limited. For more information, see the [Linux man pages](http://man7.org/linux/man-pages/man7/icmp.7.html)."
[[menus.arguments]]
name = "icmp-errors-use-inbound-interface-address"
type = "bool"
description = "When enabled, send ICMP error message replies with a source address equal to the primary address of the receiving interface that caused the error. Use this for complex network debugging."
[[menus.arguments]]
name = "ipv4-high-fragment-thresh"
type = "num"
[[menus.arguments]]
name = "ipv4-fragment-time"
