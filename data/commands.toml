[[menus]]
path = "/routing/ospf/interface-template"
type = "Directory"
[[menus.flags]]
name = "X"
description = "disabled"
[[menus.flags]]
name = "I"
description = "inactive"
[[menus.arguments]]
name = "area"
type = "enum"
description = "The OSPF area to which the matching interface will be associated."
required = true
[[menus.arguments]]
name = "interfaces"
type = ""
[[menus.arguments]]
name = "instance-id"
type = "num"
[[menus.arguments]]
name = "networks"
type = ""
[[menus.arguments]]
name = "prefix-list"
type = "enum"
description = "Name of the address list containing networks that should be advertised to the v3 interface."
unset = true
[[menus.arguments]]
name = "type"
type = "enum (broadcast | nbma | ptp | ptp-unnumbered | ptmp | ptmp-broadcast)"
[[menus.arguments]]
name = "retransmit-interval"
type = "time"
description = "Time interval after which the lost link state advertisement will be resent. When a router sends a link state advertisement (LSA) to its neighbor, the LSA is kept until the acknowledgment is received. If the acknowledgment was not received in time (see transmit-delay), the router will try to retransmit the LSA."
[[menus.arguments]]
name = "transmit-delay"
type = "time"
description = "Link-state transmit delay is the estimated time it takes to transmit a link-state update packet on the interface."
[[menus.arguments]]
name = "hello-interval"
type = "time"
description = "The interval between **HELLO** packets that the router sends out on this interface. The smaller this interval is, the faster topological changes will be detected; the tradeoff is more OSPF protocol traffic. This value must be the same for all the routers on a specific network, otherwise, adjacency between them will not form."
[[menus.arguments]]
name = "dead-interval"
type = "time"
description = "Specifies the interval after which a neighbor is declared dead. This interval is advertised in hello packets. This value must be the same for all routers on a specific network, otherwise, adjacency between them will not form."
[[menus.arguments]]
name = "priority"
type = "num"
[[menus.arguments]]
name = "cost"
type = "num"
description = "Interface cost expressed as link state metric."
[[menus.arguments]]
name = "passive"
type = "switch"
description = "If enabled, then the router does not send or receive OSPF traffic on the matching interfaces."
[[menus.arguments]]
name = "auth"
type = "enum (simple | md5 | sha1 | sha256 | sha384 | sha512)"
unset = true
[[menus.arguments]]
name = "auth-key"
type = "string"
description = "The authentication key to be used, should match on all the neighbors of the network segment."
unset = true
[[menus.arguments]]
name = "auth-id"
type = "num"
description = "The key id is used to calculate a message digest (used when MD5 or SHA authentication is enabled). The value should match all OSPF routers from the same region."
unset = true
[[menus.arguments]]
name = "use-bfd"
type = "bool"
unset = true

