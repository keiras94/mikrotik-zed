type = "enum"
unset = true
[[menus.arguments]]
name = "pw-type"
type = "enum (tagged-ethernet | raw-ethernet | vpls)"
description = "Pseudowire type (RFC 4447 Section 5.2). By default, `raw-ethernet` is used."
unset = true
[[menus.arguments]]
name = "pw-l2mtu"
type = "num"
description = "L2MTU value advertised to a remote peer (RFC 4447 Section 5.2)."
unset = true
[[menus.arguments]]
name = "pw-control-word"
type = "enum (default | enabled | disabled)"
description = "Enables or disables Control Word usage (RFC 4623 Section 4). Default values for regular and Cisco-style VPLS tunnels differ. Cisco-style by default has Control Word usage disabled. Read more in the [VPLS Control Word](../../user-guides/routing-and-networking-protocols/mpls/vpls/control-word.md) article."
unset = true
[[menus.arguments]]
name = "bridge"
type = "iface_enum"
description = "[Bridge](../interface/bridge.md) the VPLS interface belongs to."
unset = true
[[menus.arguments]]
