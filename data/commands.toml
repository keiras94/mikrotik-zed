required = true
[[menus.arguments]]
name = "action"
type = "enum (accept | jump | return | log | passthrough | add-src-to-address-list | add-dst-to-address-l..."
description = "Action to take if a packet is matched by the rule: `accept` - accept the packet. A packet is not passed to the next firewall rule.  `add-dst-to-address-list` - add the destination address to the address list specified by the `address-list` parameter.  `add-src-to-address-list` - add the source address to the address list specified by the `address-list` parameter.  `drop` - drop the packet.  `fasttrack-connection` - fasttrack the connection.  `jump` - jump to the user-defined chain specified by the value of the `jump-target` parameter.  `log` - add a message to the system log containing the following data: in-interface, out-interface, src-mac, protocol, src-ip:port->dst-ip:port, and length of the packet. After a packet is matched it is passed to the next rule in the list, similar to `passthrough`.  `passthrough` - if a packet is matched by the rule, increase the counter and go to the next rule (useful for statistics).  `reject` - reject the packet and send an ICMP response.  `return` - passes control back to the chain from where the jump took place."
