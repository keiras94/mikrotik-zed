description = "The area used for MPLS traffic engineering. TE Opaque LSAs are generated in this area. No more than one OSPF instance can have `mpls-te-area` configured."
unset = true
[[menus.arguments]]
name = "domain-id"
type = "address (flags=R)"
description = "MPLS-related parameter. Identifies the OSPF domain of the instance. This value is attached to OSPF routes redistributed in BGP as VPNv4 routes as a BGP extended community attribute and used when BGP VPNv4 routes are redistributed back to OSPF to determine whether to generate an `inter-area` or `AS-external` LSA for that route. By default Null domain-id is used, as described in [RFC 4577](https://tools.ietf.org/html/rfc4577)."
unset = true
[[menus.arguments]]
name = "domain-tag"
type = "num"
description = "If set, then used in route redistribution (as route-tag in all external LSAs generated by this router), and in route calculation (all external LSAs having this route tag are ignored). Needed for interoperability with older Cisco systems. By default not set."
unset = true
[[menus.arguments]]
name = "use-dn"
type = "bool"
description = "Forces use or ignoring of the DN bit. Useful in some CE-PE scenarios to inject `intra-area` routes into VRF. If a parameter is unset, then the DN bit is used according to RFC."
unset = true
