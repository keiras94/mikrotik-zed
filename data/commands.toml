[[menus]]
path = "/routing/ospf/area"
type = "Directory"
[[menus.flags]]
name = "X"
description = "disabled"
[[menus.flags]]
name = "I"
description = "inactive"
[[menus.flags]]
name = "D"
description = "dynamic"
[[menus.flags]]
name = "T"
description = "transit-capable"
[[menus.arguments]]
name = "name"
type = "string"
description = "The name of the area"
[[menus.arguments]]
name = "instance"
type = "enum"
description = "Name of the OSPF instance this area belongs to."
required = true
[[menus.arguments]]
name = "area-id"
type = "ipAddr"
description = "OSPF area identifier. If the router has networks in more than one area, then an area with `area-id=0.0.0.0` (the backbone) must always be present. The backbone always contains all area border routers. The backbone is responsible for distributing routing information between non-backbone areas. The backbone must be contiguous, i.e. there must be no disconnected segments. However, area border routers do not need to be physically connected to the backbone - connection to it may be simulated using a virtual link."
[[menus.arguments]]
name = "type"
type = "enum (default | stub | nssa)"
description = "The area type. Read more on the area types in the [OSPF user guides](../../user-guides/routing-and-networking-protocols/unicast/ospf/index.md#understanding-ospf-areas)."
[[menus.arguments]]
name = "no-summaries"
type = "switch"
description = "Flag parameter, if set then the area will not flood summary LSAs in the stub area."
[[menus.arguments]]
name = "default-cost"
type = "num"
