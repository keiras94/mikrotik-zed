description = "Specifies to which chain the rule will be added. If the input does not match the name of an already defined chain, a new chain will be created."
required = true
[[menus.arguments]]
name = "action"
type = "enum (accept | jump | return | log | passthrough | add-src-to-address-list | add-dst-to-address-l..."
description = "Action to take if a packet is matched by the rule: `accept` - accept the packet. A packet is not passed to the next firewall rule.  `add-dst-to-address-list` - add the destination address to the address list specified by the `address-list` parameter.  `add-src-to-address-list` - add the source address to the address list specified by the `address-list` parameter.  `drop` - drop the packet.  `jump` - jump to the user-defined chain specified by the value of the `jump-target` parameter.  `log` - add a message to the system log containing the following data: in-interface, out-interface, src-mac, protocol, src-ip:port->dst-ip:port, and length of the packet. After a packet is matched it is passed to the next rule in the list, similar to `passthrough`.  `notrack` - skip connection tracking for the packet.  `passthrough` - if a packet is matched by the rule, increase the counter and go to the next rule (useful for statistics).  `return` - passes control back to the chain from where the jump took place."
[[menus.arguments]]
name = "jump-target"
type = "enum ()"
description = "Name of the target chain to jump to. Applicable only if `action=jump`."
